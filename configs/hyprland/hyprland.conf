# ============================================
# Hyprland Configuration
# ============================================

# --- Environment ---
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GDK_BACKEND,wayland,x11
env = CLUTTER_BACKEND,wayland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = SDL_VIDEODRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

# --- Monitor ---
# Auto-detect monitors
monitor=,preferred,auto,1

# --- Input ---
input {
    kb_layout = es,cat
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle

    repeat_rate = 50
    repeat_delay = 300

    natural_scroll = true

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable-while-typing = true
    }
}

# --- General ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    layout = dwindle

    col.active_border = rgba(7aa2f7ee) rgba(bb9af7ee) 45deg
    col.inactive_border = rgba(3b4261cc)
}

# --- Dwindle layout ---
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = true
}

# --- Master layout (alternative) ---
master {
    new_status = master
    smart_resizing = true
}

# --- Decorations ---
decoration {
    rounding = 10

    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000044)
    }
}

# --- Animations ---
animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# --- Autostart ---
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hash dbus-update-activation-environment 2>/dev/null &
exec-once = waybar &
exec-once = hyprpaper &
exec-once = hypridle &
exec-once = dunst &
exec-once = nm-applet &

# --- Keybindings ---

# Terminal
SUPER, Return, exec, foot

# Application launcher
SUPER, Space, exec, rofi -show drun

# File manager
SUPER, E, exec, nautilus

# Browser
SUPER, B, exec, brave

# Close window
SUPER, Q, killactive

# Toggle fullscreen
SUPER, F, fullscreen, 0

# Toggle floating
SUPER, T, togglefloating

# Move focus
SUPER, left, movefocus, l
SUPER, right, movefocus, r
SUPER, up, movefocus, u
SUPER, down, movefocus, d

# Switch workspace
SUPER, 1, workspace, 1
SUPER, 2, workspace, 2
SUPER, 3, workspace, 3
SUPER, 4, workspace, 4
SUPER, 5, workspace, 5
SUPER, 6, workspace, 6
SUPER, 7, workspace, 7
SUPER, 8, workspace, 8
SUPER, 9, workspace, 9
SUPER, 0, workspace, 10

# Move window to workspace
SUPER SHIFT, 1, movetoworkspace, 1
SUPER SHIFT, 2, movetoworkspace, 2
SUPER SHIFT, 3, movetoworkspace, 3
SUPER SHIFT, 4, movetoworkspace, 4
SUPER SHIFT, 5, movetoworkspace, 5
SUPER SHIFT, 6, movetoworkspace, 6
SUPER SHIFT, 7, movetoworkspace, 7
SUPER SHIFT, 8, movetoworkspace, 8
SUPER SHIFT, 9, movetoworkspace, 9
SUPER SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces
SUPER, mouse_down, workspace, e+1
SUPER, mouse_up, workspace, e-1

# Resize windows (alternative to mouse)
SUPER CTRL, left, resizeactive, -80 0
SUPER CTRL, right, resizeactive, 80 0
SUPER CTRL, up, resizeactive, 0 -80
SUPER CTRL, down, resizeactive, 0 80

# Screenshot
, Print, exec, grim -g "$(slurp)" - | wl-copy

# Volume controls (media keys)
, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness controls (laptop)
, XF86MonBrightnessUp, exec, brightnessctl set +5%
, XF86MonBrightnessDown, exec, brightnessctl set 5%-

# --- Window rules ---
windowrule = float, ^(pavucontrol)$
windowrule = float, ^(nm-connection-editor)$
windowrule = float, ^(blueman-manager)$
windowrule = float, ^(file-roller)$

# --- Gaps for specific workspaces ---
# Workspace 1: Terminal/Code
# Workspace 2: Browser
# Workspace 3: Communication
# etc.

# ============================================
# Source additional configs (optional)
